<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .main-card { max-width: 500px; margin: 30px auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1a73e8; color: white; padding: 25px; text-align: center; }
        .stats-box { display: flex; justify-content: space-around; padding: 20px; background: #e8f0fe; }
        .p-4 { padding: 30px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h3>Smart School App 🚀</h3>
        <p>Admin Dashboard</p>
    </div>
    <div class="stats-box text-center">
        <div><h6>Students</h6><h4>100</h4></div>
        <div><h6>Bus Active</h6><h4>50</h4></div>
    </div>
    <div class="p-4 text-center">
        <p class="text-muted">Google Sheets Database Connecting...</p>
        <button class="btn btn-primary w-100 p-3" onclick="alert('Google AI Security Checking...')">Admin Login</button>
        <div class="mt-3">
            <label for="file-upload" style="cursor: pointer; background: #e8f0fe; padding: 10px; border-radius: 10px; display: inline-block;">
                <span style="font-size: 20px;">📎</span> Attachment ଯୋଡ଼ନ୍ତୁ
            </label>
            <input id="file-upload" type="file" style="display: none;" onchange="alert('File Selected!')"/>
        </div>
    </div>
</div>

</body>
</html>
