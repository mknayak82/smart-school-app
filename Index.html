<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School App - AI Powered</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 600px; margin-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; background: white; margin-bottom: 20px; }
        .hidden { display: none; }
        #ai-box { position: fixed; bottom: 20px; right: 20px; width: 300px; background: white; border: 1px solid #ddd; border-radius: 10px; padding: 10px; display: none; }
    </style>
</head>
<body>

<div class="container text-center">
    <h2 class="mb-4">Smart School App 🏫</h2>
    
    <div id="login-section" class="card">
        <h4>Login</h4>
        <select id="role" class="form-select mb-3" onchange="toggleFields()">
            <option value="">Role ବାଛନ୍ତୁ</option>
            <option value="admin">Admin</option>
            <option value="teacher">Teacher</option>
        </select>
        <div id="fields" class="hidden">
            <input type="text" id="user" class="form-control mb-2" placeholder="ID">
            <input type="password" id="pass" class="form-control mb-2" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div id="admin-dash" class="card hidden">
        <h4>Admin Panel (Calendar & Timetable)</h4>
        <button class="btn btn-success mb-2 w-100">Add Event to Calendar</button>
        <button class="btn btn-warning w-100">Edit Class Timetable</button>
        <button class="btn btn-danger mt-3" onclick="location.reload()">Logout</button>
    </div>
</div>

<button onclick="toggleAI()" style="position:fixed; bottom:20px; right:20px; border-radius:50%; width:60px; height:60px;" class="btn btn-info text-white">AI</button>

<div id="ai-box">
    <h6>Gemini AI Assistant</h6>
    <input type="text" id="ai-query" class="form-control mb-2" placeholder="ପଚାରନ୍ତୁ...">
    <button class="btn btn-sm btn-primary" onclick="askAI()">Send</button>
    <div id="ai-res" class="mt-2" style="font-size: 12px; color: #555;"></div>
</div>

<script>
    function toggleFields() { document.getElementById('fields').classList.remove('hidden'); }
    
    function doLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === 'admin123') {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-dash').classList.remove('hidden');
        } else { alert("Error!"); }
    }

    function toggleAI() { 
        const box = document.getElementById('ai-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function askAI() {
        const query = document.getElementById('ai-query').value;
        const resBox = document.getElementById('ai-res');
        resBox.innerText = "ଭାବୁଛି...";
        // ଏଠାରେ ଆପଣଙ୍କ API Key ବ୍ୟବହାର ହେବ
        const apiKey = "AIzaSyA5d9PVGvRpODH2gefs_HzGuMa8KvBAaS8"; 
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
            });
            const data = await response.json();
            resBox.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) { resBox.innerText = "Error connecting to AI."; }
    }
</script>
</body>
</html>
