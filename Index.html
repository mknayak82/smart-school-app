<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartSchool \u2013 School Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<style>
:root {
  --primary: #1a56db;
  --primary-dark: #1340a8;
  --primary-light: #e8eeff;
  --accent: #f59e0b;
  --accent-light: #fef3c7;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --dark: #0f172a;
  --dark2: #1e293b;
  --dark3: #334155;
  --mid: #64748b;
  --light: #f1f5f9;
  --white: #ffffff;
  --border: #e2e8f0;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(15,23,42,0.10);
  --shadow-lg: 0 12px 40px rgba(15,23,42,0.16);
  --font: 'Plus Jakarta Sans', sans-serif;
  --sidebar-w: 260px;
}
*, *::before, *::after { box-sizing: border-box; }
body { font-family: var(--font); background: var(--light); color: var(--dark); margin: 0; overflow-x: hidden; }

/* \u2500\u2500 SCROLLBAR \u2500\u2500 */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   LOGIN
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1a56db 100%);
  position: relative; overflow: hidden;
}
#login-screen::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 20% 80%, rgba(245,158,11,0.12) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(99,179,255,0.10) 0%, transparent 50%);
}
.login-card {
  background: var(--white); border-radius: 24px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  width: min(460px, 96vw); padding: 40px 36px;
  position: relative; z-index: 1;
  animation: loginPop 0.5s cubic-bezier(.22,1,.36,1);
}
@keyframes loginPop { from{opacity:0;transform:translateY(24px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

.school-logo-ring {
  width: 90px; height: 90px; border-radius: 50%;
  border: 3px dashed var(--border); margin: 0 auto 4px;
  display: flex; align-items: center; justify-content: center;
  background: var(--light); color: var(--mid); font-size: 13px;
  text-align: center; cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.2s;
}
.school-logo-ring:hover { border-color: var(--primary); }
.school-logo-ring img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.school-logo-ring input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }

.login-brand { text-align:center; margin-bottom:28px; }
.login-brand h2 { font-family:'Playfair Display',serif; font-size:22px; color:var(--dark); margin:8px 0 2px; }
.login-brand p { font-size:12px; color:var(--mid); letter-spacing:.5px; }

.role-selector { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
.role-pill {
  border:2px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center;
  cursor:pointer; transition:all .2s; background:var(--white);
}
.role-pill .ri { font-size:22px; display:block; margin-bottom:4px; }
.role-pill span { font-size:12px; font-weight:600; color:var(--mid); }
.role-pill:hover { border-color:var(--primary); background:var(--primary-light); }
.role-pill.active { border-color:var(--primary); background:var(--primary-light); }
.role-pill.active span { color:var(--primary); }

.form-label { font-size:13px; font-weight:600; color:var(--dark3); margin-bottom:5px; }
.form-control, .form-select {
  border-radius: var(--radius-sm); border:2px solid var(--border);
  font-family: var(--font); font-size:14px; padding:10px 14px;
  transition: border-color .2s, box-shadow .2s;
}
.form-control:focus, .form-select:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,.1); outline:none;
}
.btn-login {
  width:100%; padding:13px; border:none; border-radius:10px;
  background: linear-gradient(135deg, var(--primary), #3b82f6);
  color:#fff; font-size:15px; font-weight:700; font-family:var(--font);
  cursor:pointer; transition:all .2s; letter-spacing:.3px;
}
.btn-login:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(26,86,219,.35); }
.login-hint { font-size:12px; color:var(--mid); text-align:center; margin-top:12px; }
.login-hint code { background:var(--light); padding:2px 6px; border-radius:4px; font-size:11px; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   APP LAYOUT
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
#app { display:none; min-height:100vh; }
#app.visible { display:flex; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); min-height:100vh; background:var(--dark); color:#fff;
  display:flex; flex-direction:column; flex-shrink:0;
  position:sticky; top:0; height:100vh; overflow-y:auto;
  transition: transform .3s; z-index:200;
}
.sidebar-brand {
  padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,.08);
  display:flex; align-items:center; gap:12px;
}
.sb-logo {
  width:40px; height:40px; border-radius:10px; overflow:hidden; flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),#60a5fa);
  display:grid; place-items:center; font-size:18px;
}
.sb-logo img { width:100%; height:100%; object-fit:cover; }
.sb-name { font-family:'Playfair Display',serif; font-size:15px; line-height:1.2; }
.sb-role { font-size:10px; font-weight:600; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; }

.nav-section { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.35); padding:16px 20px 6px; }
