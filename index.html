<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { max-width: 500px; margin: 30px auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1a73e8; color: white; padding: 25px; text-align: center; }
        .stats-box { display: flex; justify-content: space-around; padding: 20px; background: #e8f0fe; border-bottom: 1px solid #ddd; }
        .btn-upload { background: #34a853; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
        .paper-clip { font-size: 24px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h3>Smart School App 🚀</h3>
        <p>Dashboard</p>
    </div>
    
    <div class="stats-box text-center">
        <div><h6 class="text-muted">Students</h6><h4>120</h4></div>
        <div><h6 class="text-muted">Bus Status</h6><h4 class="text-success">Active</h4></div>
    </div>

    <div class="p-4">
        <h6 class="mb-3">Document Upload (Paper Clip)</h6>
        <label for="file-input" class="btn-upload text-center" style="cursor: pointer;">
            <span class="paper-clip">📎</span> Attachment ଯୋଡ଼ନ୍ତୁ
        </label>
        <input id="file-input" type="file" style="display: none;" onchange="alert('ଫାଇଲ୍ ବଛାଗଲା!')" />
        
        <hr>
        
        <button class="btn btn-outline-primary w-100" onclick="alert('Google Sheet ସହ ଯୋଡ଼ା ହେଉଛି...')">Refresh Data</button>
    </div>
</div>

</body>
</html>
