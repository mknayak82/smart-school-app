<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; }
        .header, .footer { text-align: center; padding: 1em; background: #f8f9fa; }
        .content { padding: 2em; }
        .login-form, .admin-panel { border: 1px solid #ccc; border-radius: 5px; padding: 2em; margin: 1em 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Smart School App</h1>
    </div>
    <div class="container">
        <div class="content">
            <div class="login-form">
                <h2>Login</h2>
                <input type="text" id="username" placeholder="Username" required />
                <input type="password" id="password" placeholder="Password" required />
                <button onclick="login()">Login</button>
            </div>
            <div class="admin-panel" style="display: none;">
                <h2>Admin Panel</h2>
                <button onclick="createUser()">Create User</button>
                <button onclick="resetPassword()">Reset Password</button>
                <h3>User Roles</h3>
                <div>
                    <button onclick="setRole('teacher')">Teacher Dashboard</button>
                    <button onclick="setRole('parent')">Parent Dashboard</button>
                    <button onclick="setRole('driver')">Driver Dashboard</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 Smart School App</p>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            // Mock validation
            if (username && password) {
                localStorage.setItem('user', JSON.stringify({ username, role: 'admin' }));
                document.querySelector('.admin-panel').style.display = 'block';
            }
        }

        function createUser() {
            // Code for creating user
            alert('User created!');
        }

        function resetPassword() {
            // Code for resetting password
            alert('Password reset link sent!');
        }

        function setRole(role) {
            // Code to set role and redirect to respective dashboard
            alert(`Redirecting to ${role} dashboard...`);
        }
    </script>
</body>
</html>
